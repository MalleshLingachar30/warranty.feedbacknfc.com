<!DOCTYPE html>
<html>
<head><title>Clerk Test</title></head>
<body>
<h1>Clerk Proxy Test v2</h1>
<pre id="log" style="white-space:pre-wrap;font-size:13px;"></pre>
<script>
const log = document.getElementById('log');
function l(msg) {
  log.textContent += new Date().toISOString().slice(11,23) + ' ' + msg + '\n';
}

// Test 1: Raw fetch with no credentials
l('Test 1: fetch /api/clerk-proxy/v1/environment (no credentials)');
fetch('/api/clerk-proxy/v1/environment', { credentials: 'omit' })
  .then(async r => {
    l('  Status: ' + r.status);
    l('  Headers: content-type=' + r.headers.get('content-type'));
    l('  Headers: content-length=' + r.headers.get('content-length'));
    const text = await r.text();
    l('  Body length: ' + text.length);
    l('  Body preview: ' + text.slice(0, 100));
  })
  .catch(e => l('  ERROR: ' + e.name + ': ' + e.message));

// Test 2: fetch with credentials (same-origin)
l('Test 2: fetch /api/clerk-proxy/v1/environment (with credentials)');
fetch('/api/clerk-proxy/v1/environment', { credentials: 'same-origin' })
  .then(async r => {
    l('  Status: ' + r.status);
    const text = await r.text();
    l('  Body length: ' + text.length);
    try {
      const d = JSON.parse(text);
      l('  App name: ' + d.display_config?.application_name);
    } catch(e) { l('  Parse error: ' + e.message); }
  })
  .catch(e => l('  ERROR: ' + e.name + ': ' + e.message));

// Test 3: Simple XHR test
l('Test 3: XHR to /api/clerk-proxy/v1/environment');
const xhr = new XMLHttpRequest();
xhr.open('GET', '/api/clerk-proxy/v1/environment');
xhr.onload = () => {
  l('  XHR status: ' + xhr.status);
  l('  XHR body length: ' + xhr.responseText.length);
  l('  XHR body preview: ' + xhr.responseText.slice(0, 100));
};
xhr.onerror = () => l('  XHR ERROR: ' + xhr.statusText);
xhr.send();

// Test 4: Load Clerk JS without crossOrigin
l('Test 4: Loading clerk.browser.js (no crossOrigin)');
const s1 = document.createElement('script');
s1.src = '/api/clerk-proxy/npm/@clerk/clerk-js@6/dist/clerk.browser.js';
s1.onload = () => l('  clerk.browser.js loaded OK! window.Clerk=' + typeof window.Clerk);
s1.onerror = (e) => l('  clerk.browser.js FAILED: ' + e.type + ' ' + (e.message||''));
document.head.appendChild(s1);

// Test 5: Load Clerk JS with crossOrigin
l('Test 5: Loading clerk.browser.js (crossOrigin=anonymous)');
const s2 = document.createElement('script');
s2.src = '/api/clerk-proxy/npm/@clerk/clerk-js@6/dist/clerk.browser.js?v=2';
s2.crossOrigin = 'anonymous';
s2.onload = () => l('  clerk.browser.js (cors) loaded OK!');
s2.onerror = (e) => l('  clerk.browser.js (cors) FAILED: ' + e.type);
document.head.appendChild(s2);

// Test 6: fetch the JS file directly
l('Test 6: fetch clerk.browser.js as blob');
fetch('/api/clerk-proxy/npm/@clerk/clerk-js@6/dist/clerk.browser.js', { credentials: 'omit' })
  .then(async r => {
    l('  JS fetch status: ' + r.status);
    l('  JS content-type: ' + r.headers.get('content-type'));
    const blob = await r.blob();
    l('  JS blob size: ' + blob.size);
  })
  .catch(e => l('  JS fetch ERROR: ' + e.name + ': ' + e.message));

// Timeout
setTimeout(() => l('\n--- 15s timeout reached ---'), 15000);
</script>
</body>
</html>
